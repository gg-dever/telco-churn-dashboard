  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1f4788 0%, #0D47A1 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    /* Animated background circles */
    body::before,
    body::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      background: rgba(74, 144, 226, 0.15);
      animation: float 25s infinite ease-in-out;
    }

    body::before {
      width: 500px;
      height: 500px;
      top: -250px;
      right: -150px;
    }

    body::after {
      width: 350px;
      height: 350px;
      bottom: -175px;
      left: -100px;
      animation-delay: 10s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) translateX(0); }
      50% { transform: translateY(-40px) translateX(40px); }
    }

    .container {
      background: white;
      border-radius: 32px;
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.4);
      max-width: 600px;
      width: 100%;
      padding: 80px 60px;
      text-align: center;
      position: relative;
      z-index: 1;
      animation: slideUp 0.7s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      background: linear-gradient(135deg, #1f4788 0%, #4A90E2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-size: 3.2rem;
      margin-bottom: 24px;
      font-weight: 800;
      line-height: 1.2;
    }

    .subtitle {
      color: #666;
      font-size: 1.15rem;
      margin-bottom: 50px;
      line-height: 1.6;
    }

    .cta-button {
      display: inline-block;
      background: linear-gradient(135deg, #4A90E2 0%, #1f4788 100%);
      color: white;
      text-decoration: none;
      padding: 24px 70px;
      border-radius: 60px;
      font-size: 1.3rem;
      font-weight: 700;
      transition: all 0.4s ease;
      box-shadow: 0 10px 30px rgba(31, 71, 136, 0.5);
      position: relative;
      overflow: hidden;
    }

    .cta-button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      transition: left 0.6s;
    }

    .cta-button:hover::before {
      left: 100%;
    }

    .cta-button:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 15px 40px rgba(31, 71, 136, 0.6);
    }

    .github-link {
      display: inline-block;
      margin-top: 32px;
      color: #1f4788;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .github-link:hover {
      color: #4A90E2;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 2.4rem;
      }

      .container {
        padding: 60px 40px;
      }

      .cta-button {
        padding: 20px 50px;
        font-size: 1.15rem;
      }
    }
  </style>
